<!DOCTYPE html>
<html lang="{{lang}}">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{name}} - {{headline}}</title>
    <style>
        @page {
            size: A4;
            margin: 14mm;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f2f3f5;
            font-family: Arial, Helvetica, sans-serif;
            color: #111;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .page {
            width: 210mm;
            min-height: 297mm;
            margin: 5px auto;
            background: #fff;
            padding: 5mm 14mm;
            box-shadow: 0 10px 28px rgba(0, 0, 0, .12);
        }

        @media print {
            body {
                background: #fff;
            }

            .page {
                margin: 0;
                box-shadow: none;
            }

            a {
                color: inherit;
                text-decoration: none;
            }
        }

        .top {
            text-align: center;
        }

        .name {
            font-size: 28px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
        }

        .headline {
            font-size: 13px;
            font-weight: 700;
            margin: 4px 0 6px;
            color: #333;
        }

        .contact {
            font-size: 11.5px;
            color: #333;
            line-height: 1.35;
        }

        .contact a {
            color: #111;
        }

        .rule {
            border-top: 2px solid #111;
            margin: 10px 0 12px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .9px;
            margin: 0 0 6px 0;
        }

        .summary {
            font-size: 12.3px;
            line-height: 1.45;
            margin: 0;
            color: #1a1a1a;
        }

        .skills {
            font-size: 12px;
            line-height: 1.35;
        }

        .skill-row {
            margin: 3px 0;
        }

        .exp-item {
            margin-top: 9px;
        }

        .exp-head {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: baseline;
        }

        .exp-title {
            font-size: 13px;
            font-weight: 800;
            margin: 0;
        }

        .exp-date {
            font-size: 11.5px;
            font-weight: 700;
            color: #333;
            white-space: nowrap;
        }

        .exp-sub {
            margin-top: 2px;
            font-size: 11.5px;
            color: #444;
            font-weight: 700;
        }

        ul {
            margin: 5px 0 0 18px;
            padding: 0;
            font-size: 12px;
            line-height: 1.25;
        }

        li {
            margin: 2px 0;
        }

        .edu-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: baseline;
            margin-top: 8px;
        }

        .edu-title {
            font-size: 12.5px;
            font-weight: 800;
            margin: 0;
        }

        .edu-meta {
            font-size: 11.5px;
            color: #444;
            font-weight: 700;
            margin-top: 2px;
        }

        .muted {
            color: #555;
        }
    </style>
</head>

<body>
    <main class="page">

        <header class="top">
            <h1 class="name">{{name}}</h1>
            <div class="headline">{{headline}}</div>
            <div class="contact">
                {{contact_location}} •
                <a href="mailto:{{contact_email}}">{{contact_email}}</a> •
                <a href="https://{{contact_linkedin}}" target="_blank" rel="noreferrer">{{contact_linkedin}}</a> •
                <a href="https://{{contact_github}}" target="_blank" rel="noreferrer">{{contact_github}}</a>
            </div>
        </header>

        <div class="rule"></div>

        <section>
            <h2 class="section-title">{{label_summary}}</h2>
            <p class="summary">{{summary}}</p>
        </section>

        <div class="rule" style="border-top-width:1px;"></div>

        <section>
            <h2 class="section-title">{{label_skills}}</h2>
            <div class="skills">
                {{skills_html}}
            </div>
        </section>

        <div class="rule" style="border-top-width:1px;"></div>

        <section>
            <h2 class="section-title">{{label_experience}}</h2>
            {{experience_html}}
        </section>

        <!-- Projects -->
        <div class="rule" style="border-top-width:1px;"></div>

        <section>
            <h2 class="section-title">{{label_projects}}</h2>
            {{projects_html}}
        </section>

        <div class="rule" style="border-top-width:1px;"></div>

        <section>
            <h2 class="section-title">{{label_education}}</h2>
            {{education_html}}
        </section>

    </main>
</body>

</html>
